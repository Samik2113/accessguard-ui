name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_BEACH_06E1DC300 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload

          app_location: "."
          output_location: "dist"
          api_location: "backend"

          api_build_command: |
            set -e

            echo "Compiling TypeScript under src/services -> backend/dist/services ..."
            npx -y typescript@5.6.3 tsc \
              --target ES2020 \
              --module CommonJS \
              --moduleResolution Node \
              --esModuleInterop \
              --resolveJsonModule \
              --skipLibCheck \
              --outDir ./backend/dist/services \
              --rootDir ./src/services \
              $(find ./src/services -type f -name '*.ts' ! -name '*.d.ts' -print)

            echo "==== After compile: listing backend/dist (depth 3) ===="
            if [ -d "./backend/dist" ]; then
              find ./backend/dist -maxdepth 3 -type f -print | sed 's/^/  /'
            else
              echo "::error::backend/dist was not created. Compilation failed."
              exit 1
            fi

            echo "Build prep complete. SWA will now upload API from backend/."
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZ_FUNC_KEY: ${{ secrets.VITE_AZ_FUNC_KEY }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_BEACH_06E1DC300 }}
          action: close
